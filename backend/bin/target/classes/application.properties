spring.application.name=nina-backend
server.port=${PORT:8080}

spring.config.import=optional:classpath:application-local.properties

spring.docker.compose.enabled=${DOCKER_COMPOSE_ENABLED:false}

# MySQL — password MUST be set in application-local.properties (Option B)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/nina_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update = auto-create/alter tables | validate = use manual SQL scripts only
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

nina.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
nina.jwt.expiration=${JWT_EXPIRATION:86400000}
nina.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@ninaorganization.com}

sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.2}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
